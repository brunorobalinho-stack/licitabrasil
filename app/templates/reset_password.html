<!DOCTYPE html>
<html lang="pt-BR" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redefinir senha — LicitaBrasil</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="h-full bg-gray-50 flex items-center justify-center">
    <div class="w-full max-w-sm mx-4">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-bold text-gray-900">LicitaBrasil</h1>
            <p class="mt-2 text-sm text-gray-500">Redefinir senha</p>
        </div>

        <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-8">
            {% if success %}
            <div class="p-3 rounded-lg bg-green-50 border border-green-200 text-green-700 text-sm">
                Senha redefinida com sucesso!
                <a href="/login" class="block mt-2 font-medium text-green-800 hover:underline">Fazer login</a>
            </div>
            {% else %}
                {% if error %}
                <div class="p-3 mb-4 rounded-lg bg-red-50 border border-red-200 text-red-700 text-sm">
                    {{ error }}
                </div>
                {% endif %}
            <form method="post" action="/redefinir-senha" class="space-y-5">
                <input type="hidden" name="token" value="{{ token }}">
                <div>
                    <label for="senha" class="block text-sm font-medium text-gray-700 mb-1">Nova senha</label>
                    <input
                        type="password" name="senha" id="senha" required autofocus minlength="6"
                        class="w-full px-3 py-2.5 rounded-lg border border-gray-300 text-sm focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none"
                        placeholder="Mínimo 6 caracteres"
                    >
                </div>
                <div>
                    <label for="confirmar" class="block text-sm font-medium text-gray-700 mb-1">Confirmar senha</label>
                    <input
                        type="password" name="confirmar" id="confirmar" required minlength="6"
                        class="w-full px-3 py-2.5 rounded-lg border border-gray-300 text-sm focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none"
                        placeholder="Repita a nova senha"
                    >
                </div>
                <button
                    type="submit"
                    class="w-full py-2.5 px-4 rounded-lg bg-blue-600 text-white font-medium text-sm hover:bg-blue-700 focus:ring-2 focus:ring-blue-500 focus:ring-offset-2 transition-colors"
                >
                    Redefinir senha
                </button>
            </form>
            {% endif %}

            <p class="mt-4 text-center text-sm text-gray-500">
                <a href="/login" class="text-blue-600 hover:underline">Voltar ao login</a>
            </p>
        </div>
    </div>
</body>
</html>
