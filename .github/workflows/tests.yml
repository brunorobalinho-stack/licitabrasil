name: tests

on:
  pull_request:
  push:
    branches: [main]

defaults:
  run:
    working-directory: backend

jobs:
  vitest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      # Gera o Prisma Client (enums usados pelos types). Os testes mockam o
      # Prisma, mas mantemos o generate para refletir o build real.
      - name: Generate Prisma client
        run: npx prisma generate

      - name: Run unit tests
        run: npx vitest run
